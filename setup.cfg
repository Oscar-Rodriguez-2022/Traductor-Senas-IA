[flake8]
max-line-length = 120
extend-ignore = E203, W503, E402, E501
exclude = .git,__pycache__,data,reportes,.venv,venv,.pytest_cache

[tool:pytest]
testpaths = tests
python_files = test_*.py
addopts = -v
filterwarnings =
    ignore::DeprecationWarning

[coverage:run]
source = lsp_core
omit = tests/*,qa/*

[coverage:report]
show_missing = True
